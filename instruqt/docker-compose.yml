# Elasticsearch + Kibana: latest 9.3.x patch line (bump all three images together).
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-workshopAdmin1!}
      - xpack.license.self_generated.type=trial
      - xpack.ml.enabled=true
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - cluster.name=workshop
      - node.name=workshop-node
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:${ELASTIC_PASSWORD:-workshopAdmin1!} http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # Kibana 9+ forbids the elastic superuser for the Elasticsearch client; align kibana_system with ELASTIC_PASSWORD.
  bootstrap-kibana-user:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-workshopAdmin1!}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        set -euo pipefail &&
        curl -sS -f -u "elastic:$$ELASTIC_PASSWORD"
        -X POST "http://elasticsearch:9200/_security/user/kibana_system/_password"
        -H "Content-Type: application/json"
        -d "{\"password\":\"$$ELASTIC_PASSWORD\"}"
    restart: "no"

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.3
    container_name: kibana
    environment:
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-workshopAdmin1!}
    volumes:
      - ./kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
      bootstrap-kibana-user:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

volumes:
  esdata:
    driver: local
