# Bound into the Kibana container by docker-compose.yml (workshop defaults).
server.host: "0.0.0.0"
server.name: kibana

elasticsearch.hosts: ["http://elasticsearch:9200"]
elasticsearch.username: "kibana_system"
# Password comes from ELASTICSEARCH_PASSWORD in docker-compose.

xpack.encryptedSavedObjects.encryptionKey: "workshop-encryption-key-min-32-chars!!"
xpack.security.encryptionKey: "workshop-security-key-minimum-32-chars!!"
xpack.reporting.encryptionKey: "workshop-reporting-key-min-32-chars!!!"

uiSettings:
  overrides:
    "agentBuilder:enabled": true
