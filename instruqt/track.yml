title: "GCP Resource Drift Detection with Elastic Agent Builder"
teaser: "Use Elastic Agent Builder to detect resource drift, ML anomalies, and build custom tools for GCP infrastructure optimization."
description: |
  In this hands-on workshop you will use Elastic's AI Assistant and Agent Builder
  to analyze GCP VM resource utilization, detect drift between allocated and
  actual usage, investigate ML-powered anomalies, and build your own custom
  ES|QL-powered tools.

  **What you will learn:**
  - How to invoke Agent Builder tools with natural language prompts
  - How to detect and quantify resource drift across teams and VM types
  - How ML anomaly detection surfaces zombie VMs and capacity risks
  - How to create your own Agent Builder tool from an ES|QL query

  **Prerequisites:** Basic familiarity with Elasticsearch and GCP VM concepts.
