title: "Build Your Own AI Agent — From Consumer to Creator"
teaser: "Go beyond using AI agents — build your own tools, wire them into a custom agent, and see them answer questions they couldn't before."
description: |
  This is **Workshop 2** in the Elastic AI Assistant series.

  In Workshop 1, you used the Observability AI Assistant to investigate
  OpenTelemetry issues with built-in tools. In this workshop, you become
  the builder — creating custom ES|QL-powered tools and extending a
  real agent's capabilities.

  **What you will learn:**
  - How Agent Builder tools work (ID + description + ES|QL query)
  - How to dissect and understand existing tools
  - How to build a custom tool from scratch and register it via API
  - How to wire tools into a custom agent
  - How multi-tool chaining enables compound analysis

  **What you will build:**
  - A "Zombie VM Detector" tool (guided)
  - A second tool of your choice (self-designed)
  - Both wired into the Kafeju cost-optimization agent

  **Prerequisites:** Completed Workshop 1 (Observability AI Assistant)
  or equivalent familiarity with the Elastic AI Assistant.
